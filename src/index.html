<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline'; media-src 'self' blob: file:; connect-src 'self' wss://api.elevenlabs.io" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Video Recorder</title>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col">

  <!-- Recording View -->
  <div id="recordingView" class="flex-1 flex flex-col p-6 gap-4 max-w-4xl mx-auto w-full">
    <!-- Source selectors -->
    <div class="flex gap-4">
      <div class="flex-1">
        <label class="block text-sm text-gray-400 mb-1">Screen</label>
        <select id="screenSource" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500"></select>
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1">Mode</label>
        <select id="screenFit" class="bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
          <option value="fill">Fill</option>
          <option value="fit">Fit</option>
        </select>
      </div>
      <div class="flex-1">
        <label class="block text-sm text-gray-400 mb-1">Camera</label>
        <select id="cameraSource" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500"></select>
      </div>
      <div class="flex-1">
        <label class="block text-sm text-gray-400 mb-1">Microphone</label>
        <select id="audioSource" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500"></select>
      </div>
    </div>

    <!-- Preview + Transcript -->
    <div class="flex-1 flex gap-0 min-h-[360px] overflow-hidden">
      <!-- Transcript panel (shown during recording) -->
      <div id="transcriptPanel" class="hidden w-64 shrink-0 bg-gray-800 border border-gray-700 rounded-l flex flex-col overflow-hidden">
        <div class="flex items-center justify-between px-3 py-2 border-b border-gray-700">
          <span class="text-sm text-gray-400">Transcript</span>
          <span id="segmentBadge" class="text-xs bg-gray-600 text-gray-300 px-2 py-0.5 rounded-full">0 segments</span>
        </div>
        <div id="transcriptContent" class="flex-1 overflow-y-auto px-3 py-2 text-sm leading-relaxed">
        </div>
      </div>
      <!-- Preview -->
      <div class="flex-1 bg-black overflow-hidden relative flex items-center justify-center">
        <canvas id="compositeCanvas" class="w-full h-full object-contain"></canvas>
        <div id="noPreview" class="absolute inset-0 flex items-center justify-center text-gray-500">
          Select a source to start preview
        </div>
      </div>
    </div>

    <!-- Hidden video elements for feeding the canvas -->
    <video id="screenVideo" autoplay muted playsinline class="hidden"></video>
    <video id="cameraVideo" autoplay muted playsinline class="hidden"></video>

    <!-- Audio meter -->
    <div class="flex items-center gap-3">
      <span class="text-sm text-gray-400 w-10">Mic</span>
      <div class="flex-1 bg-gray-800 rounded-full h-3 overflow-hidden">
        <div id="audioMeter" class="bg-green-500 h-full rounded-full transition-all duration-75" style="width: 0%"></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="flex items-center justify-center gap-4">
      <button id="recordBtn" class="px-6 py-2 bg-red-600 hover:bg-red-700 rounded-lg font-medium transition-colors disabled:opacity-40 disabled:cursor-not-allowed" disabled>
        Record
      </button>
      <span id="timer" class="text-sm text-gray-400 font-mono w-20">00:00</span>
      <button id="settingsBtn" class="ml-auto text-gray-400 hover:text-white transition-colors text-sm">
        Settings
      </button>
    </div>

    <!-- Settings panel -->
    <div id="settingsPanel" class="hidden bg-gray-800 border border-gray-700 rounded p-4">
      <div class="flex items-center gap-3">
        <label class="text-sm text-gray-400 shrink-0">Save to</label>
        <span id="folderPath" class="text-sm truncate flex-1 text-gray-300">Not set</span>
        <button id="openFolderBtn" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-sm transition-colors hidden">Open</button>
        <button id="pickFolderBtn" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-sm transition-colors">Browse</button>
      </div>
    </div>
  </div>

  <!-- Processing View -->
  <div id="processingView" class="hidden flex-1 flex flex-col items-center justify-center p-6 gap-4">
    <div class="text-xl font-medium">Trimming silence...</div>
    <div id="processingStatus" class="text-sm text-gray-400">Processing segments</div>
    <div class="w-64 bg-gray-800 rounded-full h-3 overflow-hidden">
      <div id="processingBar" class="bg-blue-500 h-full rounded-full transition-all duration-300 animate-pulse" style="width: 100%"></div>
    </div>
  </div>

  <!-- Editor View -->
  <div id="editorView" class="hidden flex-1 flex flex-col p-6 gap-4 max-w-5xl mx-auto w-full">
    <!-- Top toolbar -->
    <div class="flex items-center gap-4">
      <button id="editorBackBtn" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded text-sm transition-colors">Back to Recording</button>
      <span id="editorTime" class="text-sm text-gray-400 font-mono flex-1 text-center">00:00 / 00:00</span>
      <button id="editorRenderBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded text-sm font-medium transition-colors">Render</button>
    </div>

    <!-- Editor canvas -->
    <div class="flex-1 bg-black overflow-hidden relative flex items-center justify-center min-h-[360px]">
      <canvas id="editorCanvas" class="w-full h-full object-contain" style="aspect-ratio: 16/9;"></canvas>
    </div>

    <!-- Hidden video elements for editor playback -->
    <video id="editorScreenVideo" playsinline class="hidden"></video>
    <video id="editorCameraVideo" muted playsinline class="hidden"></video>

    <!-- Playback controls -->
    <div class="flex items-center justify-center gap-3">
      <button id="editorPlayBtn" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded text-sm transition-colors">Play</button>
      <button id="editorKeyframeBtn" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded text-sm transition-colors">Add Keyframe</button>
      <button id="editorToggleCamBtn" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded text-sm transition-colors">Toggle Camera</button>
      <button id="editorDeleteKfBtn" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded text-sm transition-colors">Delete Keyframe</button>
    </div>

    <!-- Timeline scrubber -->
    <div id="editorTimeline" class="relative bg-gray-800 rounded h-8 cursor-pointer select-none">
      <div id="editorScrubber" class="absolute top-0 bottom-0 w-0.5 bg-white pointer-events-none" style="left: 0%"></div>
      <div id="editorKeyframeMarkers" class="absolute inset-0 pointer-events-none"></div>
    </div>

    <!-- Render progress -->
    <div id="editorRenderProgress" class="hidden">
      <div class="text-sm text-gray-400 mb-1" id="editorRenderLabel">Rendering...</div>
      <div class="bg-gray-800 rounded-full h-3 overflow-hidden">
        <div id="editorRenderBar" class="bg-blue-500 h-full rounded-full transition-all duration-150" style="width: 0%"></div>
      </div>
    </div>
  </div>

  <script>
    const screenSelect = document.getElementById('screenSource');
    const screenFitSelect = document.getElementById('screenFit');
    const cameraSelect = document.getElementById('cameraSource');
    const audioSelect = document.getElementById('audioSource');
    const canvas = document.getElementById('compositeCanvas');
    const ctx = canvas.getContext('2d');
    const screenVideo = document.getElementById('screenVideo');
    const cameraVideo = document.getElementById('cameraVideo');
    const noPreview = document.getElementById('noPreview');
    const audioMeter = document.getElementById('audioMeter');
    const recordBtn = document.getElementById('recordBtn');
    const timerEl = document.getElementById('timer');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const folderPathEl = document.getElementById('folderPath');
    const openFolderBtn = document.getElementById('openFolderBtn');
    const pickFolderBtn = document.getElementById('pickFolderBtn');
    const recordingView = document.getElementById('recordingView');
    const transcriptPanel = document.getElementById('transcriptPanel');
    const transcriptContent = document.getElementById('transcriptContent');
    const segmentBadge = document.getElementById('segmentBadge');
    const processingView = document.getElementById('processingView');
    const processingStatus = document.getElementById('processingStatus');

    // Editor DOM refs
    const editorView = document.getElementById('editorView');
    const editorCanvas = document.getElementById('editorCanvas');
    const editorCtx = editorCanvas.getContext('2d');
    const editorScreenVideo = document.getElementById('editorScreenVideo');
    const editorCameraVideo = document.getElementById('editorCameraVideo');
    const editorBackBtn = document.getElementById('editorBackBtn');
    const editorPlayBtn = document.getElementById('editorPlayBtn');
    const editorKeyframeBtn = document.getElementById('editorKeyframeBtn');
    const editorToggleCamBtn = document.getElementById('editorToggleCamBtn');
    const editorDeleteKfBtn = document.getElementById('editorDeleteKfBtn');
    const editorRenderBtn = document.getElementById('editorRenderBtn');
    const editorTimeEl = document.getElementById('editorTime');
    const editorTimeline = document.getElementById('editorTimeline');
    const editorScrubber = document.getElementById('editorScrubber');
    const editorKeyframeMarkers = document.getElementById('editorKeyframeMarkers');
    const editorRenderProgress = document.getElementById('editorRenderProgress');
    const editorRenderLabel = document.getElementById('editorRenderLabel');
    const editorRenderBar = document.getElementById('editorRenderBar');

    let screenStream = null;
    let cameraStream = null;
    let audioStream = null;
    let recorders = [];
    let recording = false;
    let timerInterval = null;
    let startTime = 0;
    let audioContext = null;
    let analyser = null;
    let meterRAF = null;
    let drawRAF = null;
    let saveFolder = localStorage.getItem('saveFolder') || '';
    let scribeWs = null;
    let scribeWorkletNode = null;
    let speechSegments = [];
    let audioChunkBuffer = [];
    let audioSendInterval = null;
    let micSourceNode = null;
    let scribeAudioOffset = 0; // seconds between recording start and first audio sent to Scribe
    let workletRegistered = null; // tracks which AudioContext has the worklet registered

    const CANVAS_W = 1920;
    const CANVAS_H = 1080;
    const PIP_FRACTION = 0.25;
    const PIP_MARGIN = 20;
    const PIP_SIZE = Math.round(CANVAS_W * PIP_FRACTION);
    const TRANSITION_DURATION = 0.3;

    canvas.width = CANVAS_W;
    canvas.height = CANVAS_H;
    editorCanvas.width = CANVAS_W;
    editorCanvas.height = CANVAS_H;

    // ===== Editor State =====
    let editorState = null;
    let editorDrawRAF = null;
    let draggingPip = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    // ===== Shared drawPip function =====
    function drawPip(targetCtx, video, pipX, pipY, pipW, pipH) {
      const r = 12;
      targetCtx.save();
      targetCtx.beginPath();
      targetCtx.moveTo(pipX + r, pipY);
      targetCtx.lineTo(pipX + pipW - r, pipY);
      targetCtx.quadraticCurveTo(pipX + pipW, pipY, pipX + pipW, pipY + r);
      targetCtx.lineTo(pipX + pipW, pipY + pipH - r);
      targetCtx.quadraticCurveTo(pipX + pipW, pipY + pipH, pipX + pipW - r, pipY + pipH);
      targetCtx.lineTo(pipX + r, pipY + pipH);
      targetCtx.quadraticCurveTo(pipX, pipY + pipH, pipX, pipY + pipH - r);
      targetCtx.lineTo(pipX, pipY + r);
      targetCtx.quadraticCurveTo(pipX, pipY, pipX + r, pipY);
      targetCtx.closePath();
      targetCtx.clip();
      const camW = video.videoWidth;
      const camH = video.videoHeight;
      const cropSize = Math.min(camW, camH);
      const sx = (camW - cropSize) / 2;
      const sy = (camH - cropSize) / 2;
      targetCtx.drawImage(video, sx, sy, cropSize, cropSize, pipX, pipY, pipW, pipH);
      targetCtx.restore();
    }

    // Populate device lists
    async function enumerateDevices() {
      try {
        const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
        tempStream.getTracks().forEach(t => t.stop());
      } catch (e) {}

      const devices = await navigator.mediaDevices.enumerateDevices();
      const sources = await window.electronAPI.getSources();

      screenSelect.innerHTML = '<option value="">None</option>';
      cameraSelect.innerHTML = '<option value="">None</option>';
      audioSelect.innerHTML = '<option value="">None</option>';

      sources.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.name;
        screenSelect.appendChild(opt);
      });

      const videoInputs = devices.filter(d => d.kind === 'videoinput');

      if (videoInputs.length > 0) {
        const sep = document.createElement('option');
        sep.disabled = true;
        sep.textContent = '── Capture Devices ──';
        screenSelect.appendChild(sep);
        videoInputs.forEach((d, i) => {
          const opt = document.createElement('option');
          opt.value = 'device:' + d.deviceId;
          opt.textContent = d.label || `Camera ${i + 1}`;
          screenSelect.appendChild(opt);
        });
      }

      videoInputs.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.textContent = d.label || `Camera ${i + 1}`;
        cameraSelect.appendChild(opt);
      });

      devices.filter(d => d.kind === 'audioinput').forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.textContent = d.label || `Microphone ${i + 1}`;
        audioSelect.appendChild(opt);
      });

      // Default to first screen source (Entire Screen)
      const screenIdx = sources.findIndex(s => s.id.startsWith('screen:'));
      if (screenIdx !== -1) screenSelect.selectedIndex = screenIdx + 1; // +1 for "None"
      else if (screenSelect.options.length > 1) screenSelect.selectedIndex = 1;
      if (cameraSelect.options.length > 1) cameraSelect.selectedIndex = 1;
      if (audioSelect.options.length > 1) audioSelect.selectedIndex = 1;
    }

    async function updateScreenStream() {
      if (screenStream) {
        screenStream.getTracks().forEach(t => t.stop());
        screenStream = null;
        screenVideo.srcObject = null;
      }

      const sourceId = screenSelect.value;
      if (!sourceId) return;

      if (sourceId.startsWith('device:')) {
        const deviceId = sourceId.slice('device:'.length);
        screenStream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: { deviceId: { exact: deviceId }, width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
      } else {
        screenStream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            mandatory: {
              chromeMediaSource: 'desktop',
              chromeMediaSourceId: sourceId
            }
          }
        });
      }
      screenVideo.srcObject = screenStream;
    }

    async function updateCameraStream() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
        cameraVideo.srcObject = null;
      }

      const deviceId = cameraSelect.value;
      if (!deviceId) return;

      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { deviceId: { exact: deviceId }, width: { ideal: 1920 }, height: { ideal: 1080 }, aspectRatio: { ideal: 16 / 9 } },
        audio: false
      });
      cameraVideo.srcObject = cameraStream;
    }

    async function updateAudioStream() {
      stopAudioMeter();
      if (audioStream) {
        audioStream.getTracks().forEach(t => t.stop());
        audioStream = null;
      }

      const deviceId = audioSelect.value;
      if (!deviceId) return;

      audioStream = await navigator.mediaDevices.getUserMedia({
        audio: { deviceId: { exact: deviceId } },
        video: false
      });
      startAudioMeter(audioStream);
    }

    function updatePreview() {
      const hasAny = screenStream || cameraStream;
      noPreview.classList.toggle('hidden', !!hasAny);
      recordBtn.disabled = !hasAny || !saveFolder;

      if (drawRAF) cancelAnimationFrame(drawRAF);
      if (hasAny) drawComposite();
    }

    function drawComposite() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      const hasScreen = screenStream && screenVideo.videoWidth;
      const hasCamera = cameraStream && cameraVideo.videoWidth;

      const drawScreen = screenFitSelect.value === 'fill' ? drawFill : drawFit;

      if (hasScreen && hasCamera) {
        drawScreen(ctx, screenVideo, 0, 0, CANVAS_W, CANVAS_H);
        const pipW = PIP_SIZE;
        const pipH = pipW;
        const pipX = CANVAS_W - pipW - PIP_MARGIN;
        const pipY = CANVAS_H - pipH - PIP_MARGIN;
        drawPip(ctx, cameraVideo, pipX, pipY, pipW, pipH);
      } else if (hasScreen) {
        drawScreen(ctx, screenVideo, 0, 0, CANVAS_W, CANVAS_H);
      } else if (hasCamera) {
        drawFit(ctx, cameraVideo, 0, 0, CANVAS_W, CANVAS_H);
      }

      drawRAF = requestAnimationFrame(drawComposite);
    }

    function drawFit(targetCtx, video, x, y, w, h) {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) return;
      const scale = Math.min(w / vw, h / vh);
      const dw = vw * scale;
      const dh = vh * scale;
      const dx = x + (w - dw) / 2;
      const dy = y + (h - dh) / 2;
      targetCtx.drawImage(video, dx, dy, dw, dh);
    }

    function drawFill(targetCtx, video, x, y, w, h) {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) return;
      const scale = Math.max(w / vw, h / vh);
      const dw = vw * scale;
      const dh = vh * scale;
      const dx = x + (w - dw) / 2;
      const dy = y + (h - dh) / 2;
      targetCtx.save();
      targetCtx.beginPath();
      targetCtx.rect(x, y, w, h);
      targetCtx.clip();
      targetCtx.drawImage(video, dx, dy, dw, dh);
      targetCtx.restore();
    }

    // Audio level meter
    function startAudioMeter(stream) {
      audioContext = new AudioContext();
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 256;
      micSourceNode = audioContext.createMediaStreamSource(stream);
      micSourceNode.connect(analyser);

      const data = new Uint8Array(analyser.frequencyBinCount);

      function updateMeter() {
        analyser.getByteFrequencyData(data);
        const avg = data.reduce((a, b) => a + b, 0) / data.length;
        const pct = Math.min(100, (avg / 128) * 100);
        audioMeter.style.width = pct + '%';
        audioMeter.className = `h-full rounded-full transition-all duration-75 ${pct > 70 ? 'bg-red-500' : pct > 40 ? 'bg-yellow-500' : 'bg-green-500'}`;
        meterRAF = requestAnimationFrame(updateMeter);
      }
      updateMeter();
    }

    function stopAudioMeter() {
      if (meterRAF) cancelAnimationFrame(meterRAF);
      meterRAF = null;
      micSourceNode = null;
      if (audioContext) {
        if (workletRegistered === audioContext) workletRegistered = null;
        audioContext.close();
        audioContext = null;
      }
      audioMeter.style.width = '0%';
    }

    // Recording
    function toggleRecording() {
      if (!recording) startRecording();
      else stopRecording();
    }

    function createRecorder(stream, suffix) {
      const chunks = [];
      const recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });

      recorder.ondataavailable = (e) => {
        if (e.data.size > 0) chunks.push(e.data);
      };

      // blobPromise resolves with { blob, path } when recording stops
      recorder.blobPromise = new Promise((resolve) => {
        recorder.onstop = async () => {
          const blob = new Blob(chunks, { type: 'video/webm' });
          const buffer = await blob.arrayBuffer();
          const savedPath = await window.electronAPI.saveVideo(buffer, saveFolder, suffix);
          if (savedPath) console.log('Saved:', savedPath);
          resolve({ blob, path: savedPath });
        };
      });

      recorder.suffix = suffix;
      return recorder;
    }

    function addAudioToStream(stream) {
      if (!audioStream) return stream;
      const combined = new MediaStream([
        ...stream.getVideoTracks(),
        ...audioStream.getAudioTracks()
      ]);
      return combined;
    }

    function mergeInt16Arrays(arrays) {
      let totalLength = 0;
      for (const arr of arrays) totalLength += arr.length;
      const merged = new Int16Array(totalLength);
      let offset = 0;
      for (const arr of arrays) {
        merged.set(arr, offset);
        offset += arr.length;
      }
      return merged;
    }

    async function startRecording() {
      recorders = [];
      speechSegments = [];
      audioChunkBuffer = [];

      // Individual screen (with audio)
      if (screenStream) {
        const screenOnly = addAudioToStream(new MediaStream(screenStream.getVideoTracks()));
        recorders.push(createRecorder(screenOnly, 'screen'));
      }

      // Individual camera (with audio)
      if (cameraStream) {
        const cameraOnly = addAudioToStream(new MediaStream(cameraStream.getVideoTracks()));
        recorders.push(createRecorder(cameraOnly, 'camera'));
      }

      recorders.forEach(r => r.start(100));
      recording = true;
      recordBtn.textContent = 'Stop';
      recordBtn.classList.replace('bg-red-600', 'bg-gray-600');
      recordBtn.classList.replace('hover:bg-red-700', 'hover:bg-gray-700');
      screenSelect.disabled = true;
      cameraSelect.disabled = true;
      audioSelect.disabled = true;

      startTime = Date.now();
      timerInterval = setInterval(updateTimer, 200);

      // Show transcript panel and clear previous content
      transcriptPanel.classList.remove('hidden');
      transcriptContent.innerHTML = '';
      segmentBadge.textContent = '0 segments';

      // Set up Scribe via direct WebSocket
      if (audioContext && audioStream && micSourceNode) {
        try {
          const token = await window.electronAPI.getScribeToken();
          const sampleRate = audioContext.sampleRate;

          // Map sample rate to ElevenLabs audio_format parameter
          const formatMap = { 8000: 'pcm_8000', 16000: 'pcm_16000', 22050: 'pcm_22050', 24000: 'pcm_24000', 44100: 'pcm_44100', 48000: 'pcm_48000' };
          const audioFormat = formatMap[sampleRate] || 'pcm_16000';

          const wsUrl = `wss://api.elevenlabs.io/v1/speech-to-text/realtime`
            + `?model_id=scribe_v2_realtime`
            + `&token=${token}`
            + `&audio_format=${audioFormat}`
            + `&commit_strategy=vad`
            + `&include_timestamps=true`
            + `&vad_silence_threshold_secs=1.0`
            + `&vad_threshold=0.4`
            + `&min_speech_duration_ms=200`;

          scribeWs = new WebSocket(wsUrl);

          scribeWs.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.message_type === 'partial_transcript') {
              updatePartialTranscript(msg.text || '');
            } else if (msg.message_type === 'committed_transcript_with_timestamps') {
              commitTranscript(msg);
            }
          };

          scribeWs.onerror = (err) => {
            console.error('Scribe WebSocket error:', err);
          };

          // Set up AudioWorklet for PCM capture (only register module once per AudioContext)
          if (workletRegistered !== audioContext) {
            await audioContext.audioWorklet.addModule('audio-processor.js');
            workletRegistered = audioContext;
          }
          scribeWorkletNode = new AudioWorkletNode(audioContext, 'audio-capture');
          micSourceNode.connect(scribeWorkletNode);

          scribeWorkletNode.port.onmessage = (e) => {
            if (e.data.pcm) {
              audioChunkBuffer.push(new Int16Array(e.data.pcm));
            }
          };

          // Record the offset: time between recording start and first audio send
          scribeAudioOffset = (Date.now() - startTime) / 1000;

          // Send accumulated audio every ~100ms
          audioSendInterval = setInterval(() => {
            if (audioChunkBuffer.length === 0 || !scribeWs || scribeWs.readyState !== WebSocket.OPEN) return;
            const merged = mergeInt16Arrays(audioChunkBuffer);
            audioChunkBuffer = [];
            const bytes = new Uint8Array(merged.buffer);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) {
              binary += String.fromCharCode(bytes[i]);
            }
            const base64 = btoa(binary);
            scribeWs.send(JSON.stringify({
              message_type: 'input_audio_chunk',
              audio_base_64: base64,
              sample_rate: sampleRate,
              commit: false
            }));
          }, 100);

        } catch (err) {
          console.warn('Scribe setup failed:', err);
        }
      }
    }

    function updatePartialTranscript(text) {
      let partial = document.getElementById('partialText');
      if (!partial) {
        partial = document.createElement('div');
        partial.id = 'partialText';
        partial.className = 'text-gray-500 italic';
        transcriptContent.appendChild(partial);
      }
      partial.textContent = text;
      transcriptContent.scrollTop = transcriptContent.scrollHeight;
    }

    function commitTranscript(data) {
      // Remove partial display
      const partial = document.getElementById('partialText');
      if (partial) partial.remove();

      const words = (data.words || []).filter(w => w.type === 'word');
      if (words.length > 0) {
        // Shift timestamps by the offset between recording start and first audio sent
        speechSegments.push({
          start: words[0].start + scribeAudioOffset,
          end: words[words.length - 1].end + scribeAudioOffset,
          text: data.text
        });
      }

      // Add committed text
      const div = document.createElement('div');
      div.className = 'mb-2 text-gray-200';
      div.dataset.segmentIndex = speechSegments.length - 1;
      div.textContent = data.text || '';
      transcriptContent.appendChild(div);
      transcriptContent.scrollTop = transcriptContent.scrollHeight;

      updateSegmentBadge();
    }

    async function stopRecording() {
      const recordedDuration = (Date.now() - startTime) / 1000;
      clearInterval(timerInterval);

      // Stop audio send interval
      if (audioSendInterval) {
        clearInterval(audioSendInterval);
        audioSendInterval = null;
      }

      // Disconnect worklet (must sever micSourceNode→worklet input, not just worklet outputs)
      if (scribeWorkletNode) {
        scribeWorkletNode.port.onmessage = null;
        if (micSourceNode) micSourceNode.disconnect(scribeWorkletNode);
        scribeWorkletNode.disconnect();
        scribeWorkletNode = null;
      }

      // Send final commit and close WebSocket
      const hadScribe = !!scribeWs;
      if (scribeWs && scribeWs.readyState === WebSocket.OPEN) {
        scribeWs.send(JSON.stringify({ message_type: 'commit' }));
        await new Promise(r => setTimeout(r, 1000));
        scribeWs.close();
      }
      scribeWs = null;
      audioChunkBuffer = [];

      recorders.forEach(r => {
        if (r.state !== 'inactive') r.stop();
      });

      // Await all blobs
      const results = {};
      for (const r of recorders) {
        results[r.suffix] = await r.blobPromise;
      }

      recorders = [];
      recording = false;
      recordBtn.textContent = 'Record';
      recordBtn.classList.replace('bg-gray-600', 'bg-red-600');
      recordBtn.classList.replace('hover:bg-gray-700', 'hover:bg-red-700');
      screenSelect.disabled = false;
      cameraSelect.disabled = false;
      audioSelect.disabled = false;
      timerEl.textContent = '00:00';

      // Hide transcript panel
      transcriptPanel.classList.add('hidden');

      // Enter editor if we have at least a screen recording
      if (results.screen) {
        let screenPath = results.screen.path;
        let cameraPath = results.camera?.path || null;

        // Trim silence if we have speech segments
        const activeSegments = speechSegments.filter(s => !s.deleted);
        if (activeSegments.length > 0) {
          // Show processing view
          recordingView.classList.add('hidden');
          processingView.classList.remove('hidden');
          processingStatus.textContent = `Processing ${activeSegments.length} segment${activeSegments.length !== 1 ? 's' : ''}`;

          try {
            const trimmed = await window.electronAPI.trimSilence({
              screenPath,
              cameraPath,
              segments: activeSegments,
              outputFolder: saveFolder
            });
            screenPath = trimmed.screenPath || screenPath;
            cameraPath = trimmed.cameraPath || cameraPath;
          } catch (err) {
            console.error('Trim failed, using original files:', err);
          }

          processingView.classList.add('hidden');
          recordingView.classList.remove('hidden');
        } else if (hadScribe) {
          console.warn('No speech detected, using full recording');
        }

        enterEditor(
          results.screen.blob, results.camera?.blob || null,
          screenPath, cameraPath,
          recordedDuration
        );
      }
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      timerEl.textContent = `${m}:${s}`;
    }

    // ===== Editor =====

    function enterEditor(screenBlob, cameraBlob, screenPath, cameraPath, recordedDuration) {
      // Stop live preview
      if (drawRAF) { cancelAnimationFrame(drawRAF); drawRAF = null; }

      // Use file:// URLs for trimmed files, blob URLs for originals
      const screenBlobUrl = screenPath && screenPath.includes('-trimmed')
        ? 'file://' + screenPath
        : URL.createObjectURL(screenBlob);
      const cameraBlobUrl = cameraPath && cameraPath.includes('-trimmed')
        ? 'file://' + cameraPath
        : (cameraBlob ? URL.createObjectURL(cameraBlob) : null);

      const defaultPipX = CANVAS_W - PIP_SIZE - PIP_MARGIN;
      const defaultPipY = CANVAS_H - PIP_SIZE - PIP_MARGIN;

      editorState = {
        screenBlobUrl,
        cameraBlobUrl,
        screenPath,
        cameraPath,
        duration: recordedDuration,
        currentTime: 0,
        playing: false,
        pipSize: PIP_SIZE,
        defaultPipX,
        defaultPipY,
        keyframes: [],
        screenFitMode: screenFitSelect.value,
        rendering: false,
        renderProgress: 0,
        hasCamera: !!cameraBlob
      };

      editorScreenVideo.src = screenBlobUrl;
      editorScreenVideo.currentTime = 0;
      if (cameraBlobUrl) {
        editorCameraVideo.src = cameraBlobUrl;
        editorCameraVideo.currentTime = 0;
      }

      // Wait for metadata to get accurate duration and source resolution
      editorScreenVideo.onloadedmetadata = () => {
        editorState.sourceWidth = editorScreenVideo.videoWidth;
        editorState.sourceHeight = editorScreenVideo.videoHeight;
        if (isFinite(editorScreenVideo.duration) && editorScreenVideo.duration > 0) {
          editorState.duration = editorScreenVideo.duration;
        }
        updateEditorTimeDisplay();
      };

      // Show editor, hide recording
      recordingView.classList.add('hidden');
      editorView.classList.remove('hidden');

      updateEditorTimeDisplay();
      renderKeyframeMarkers();
      editorDrawLoop();
    }

    function exitEditor() {
      editorPause();
      if (editorDrawRAF) { cancelAnimationFrame(editorDrawRAF); editorDrawRAF = null; }

      // Revoke blob URLs (not file:// URLs)
      if (editorState) {
        if (editorState.screenBlobUrl && editorState.screenBlobUrl.startsWith('blob:')) URL.revokeObjectURL(editorState.screenBlobUrl);
        if (editorState.cameraBlobUrl && editorState.cameraBlobUrl.startsWith('blob:')) URL.revokeObjectURL(editorState.cameraBlobUrl);
      }
      editorScreenVideo.src = '';
      editorCameraVideo.src = '';
      editorState = null;

      // Show recording, hide editor
      editorView.classList.add('hidden');
      recordingView.classList.remove('hidden');

      updatePreview();
    }

    function getStateAtTime(time) {
      const defaultKf = { time: 0, pipX: editorState.defaultPipX, pipY: editorState.defaultPipY, pipVisible: true };
      const userKfs = editorState.keyframes;
      const kfs = userKfs.length > 0 && userKfs[0].time === 0 ? userKfs : [defaultKf, ...userKfs];

      // Find active keyframe (last one at or before time)
      let activeIdx = 0;
      for (let i = 1; i < kfs.length; i++) {
        if (kfs[i].time <= time) activeIdx = i;
        else break;
      }

      const active = kfs[activeIdx];
      const prev = activeIdx > 0 ? kfs[activeIdx - 1] : null;
      const next = activeIdx < kfs.length - 1 ? kfs[activeIdx + 1] : null;

      let pipX = active.pipX;
      let pipY = active.pipY;
      let opacity = active.pipVisible ? 1 : 0;

      // Position transition: smooth movement arriving at next keyframe
      if (next && (next.pipX !== active.pipX || next.pipY !== active.pipY)) {
        const transStart = Math.max(active.time, next.time - TRANSITION_DURATION);
        const dur = next.time - transStart;
        if (time >= transStart && dur > 0) {
          const t = Math.min((time - transStart) / dur, 1);
          pipX = active.pipX + (next.pipX - active.pipX) * t;
          pipY = active.pipY + (next.pipY - active.pipY) * t;
        }
      }

      // Fade transition: fade out/in after visibility toggle keyframe
      if (prev && prev.pipVisible !== active.pipVisible) {
        const elapsed = time - active.time;
        if (elapsed < TRANSITION_DURATION) {
          const t = elapsed / TRANSITION_DURATION;
          if (active.pipVisible) {
            opacity = t; // Fading in
          } else {
            opacity = 1 - t; // Fading out
          }
        }
      }

      return { pipX, pipY, pipVisible: opacity > 0, opacity };
    }

    function formatTime(seconds) {
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(Math.floor(seconds % 60)).padStart(2, '0');
      return `${m}:${s}`;
    }

    function updateEditorTimeDisplay() {
      if (!editorState) return;
      editorTimeEl.textContent = `${formatTime(editorState.currentTime)} / ${formatTime(editorState.duration)}`;
    }

    function editorPlay() {
      if (!editorState || editorState.rendering) return;
      editorState.playing = true;
      editorScreenVideo.play();
      if (editorState.hasCamera) editorCameraVideo.play();
      editorPlayBtn.textContent = 'Pause';
    }

    function editorPause() {
      if (!editorState) return;
      editorState.playing = false;
      editorScreenVideo.pause();
      if (editorState.hasCamera) editorCameraVideo.pause();
      editorPlayBtn.textContent = 'Play';
    }

    function editorTogglePlay() {
      if (!editorState) return;
      if (editorState.playing) editorPause();
      else editorPlay();
    }

    function editorSeek(time) {
      if (!editorState) return;
      time = Math.max(0, Math.min(time, editorState.duration));
      editorState.currentTime = time;
      editorScreenVideo.currentTime = time;
      if (editorState.hasCamera) editorCameraVideo.currentTime = time;
      updateEditorTimeDisplay();
      updateScrubberPosition();
    }

    function updateScrubberPosition() {
      if (!editorState || editorState.duration <= 0) return;
      const pct = (editorState.currentTime / editorState.duration) * 100;
      editorScrubber.style.left = pct + '%';
    }

    function editorDrawLoop() {
      if (!editorState) return;

      if (editorState.playing) {
        editorState.currentTime = editorScreenVideo.currentTime;
        updateEditorTimeDisplay();
        updateScrubberPosition();

        // Drift correction
        if (editorState.hasCamera) {
          const drift = Math.abs(editorScreenVideo.currentTime - editorCameraVideo.currentTime);
          if (drift > 0.05) {
            editorCameraVideo.currentTime = editorScreenVideo.currentTime;
          }
        }

        // Auto-pause at end
        if (editorScreenVideo.ended) {
          editorPause();
        }
      }

      // Draw composite frame
      editorCtx.fillStyle = '#000';
      editorCtx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      const hasScreen = editorScreenVideo.videoWidth > 0;
      const hasCamera = editorState.hasCamera && editorCameraVideo.videoWidth > 0;

      const drawScreenFn = editorState.screenFitMode === 'fill' ? drawFill : drawFit;

      if (hasScreen) {
        drawScreenFn(editorCtx, editorScreenVideo, 0, 0, CANVAS_W, CANVAS_H);
      }

      if (hasCamera) {
        const kf = getStateAtTime(editorState.currentTime);
        if (kf.opacity > 0) {
          editorCtx.save();
          editorCtx.globalAlpha = kf.opacity;
          drawPip(editorCtx, editorCameraVideo, kf.pipX, kf.pipY, editorState.pipSize, editorState.pipSize);
          editorCtx.restore();
        }
      }

      editorDrawRAF = requestAnimationFrame(editorDrawLoop);
    }

    // ===== Keyframe management =====

    function addKeyframe() {
      if (!editorState || editorState.rendering) return;
      const time = editorState.currentTime;
      const current = getStateAtTime(time);

      // Remove existing keyframe at this exact time
      editorState.keyframes = editorState.keyframes.filter(kf => kf.time !== time);

      editorState.keyframes.push({
        time,
        pipX: current.pipX,
        pipY: current.pipY,
        pipVisible: current.pipVisible
      });

      editorState.keyframes.sort((a, b) => a.time - b.time);
      renderKeyframeMarkers();
    }

    function toggleCameraVisibility() {
      if (!editorState || editorState.rendering) return;
      const time = editorState.currentTime;
      const current = getStateAtTime(time);

      // Check if there's already a keyframe at this exact time
      let existing = editorState.keyframes.find(kf => Math.abs(kf.time - time) < 0.001);
      if (existing) {
        existing.pipVisible = !existing.pipVisible;
      } else {
        editorState.keyframes.push({
          time,
          pipX: current.pipX,
          pipY: current.pipY,
          pipVisible: !current.pipVisible
        });
        editorState.keyframes.sort((a, b) => a.time - b.time);
      }

      renderKeyframeMarkers();
    }

    function deleteNearestKeyframe() {
      if (!editorState || editorState.rendering || editorState.keyframes.length === 0) return;
      const time = editorState.currentTime;
      let nearestIdx = 0;
      let nearestDist = Math.abs(editorState.keyframes[0].time - time);
      for (let i = 1; i < editorState.keyframes.length; i++) {
        const dist = Math.abs(editorState.keyframes[i].time - time);
        if (dist < nearestDist) {
          nearestDist = dist;
          nearestIdx = i;
        }
      }
      editorState.keyframes.splice(nearestIdx, 1);
      renderKeyframeMarkers();
    }

    function renderKeyframeMarkers() {
      if (!editorState) return;
      editorKeyframeMarkers.innerHTML = '';
      for (const kf of editorState.keyframes) {
        const pct = (kf.time / editorState.duration) * 100;
        const dot = document.createElement('div');
        dot.className = 'absolute rounded-full';
        dot.style.width = '8px';
        dot.style.height = '8px';
        dot.style.top = '50%';
        dot.style.transform = 'translate(-50%, -50%)';
        dot.style.left = pct + '%';
        dot.style.backgroundColor = kf.pipVisible ? '#3b82f6' : '#ef4444';
        editorKeyframeMarkers.appendChild(dot);
      }
    }

    // ===== PiP drag-to-reposition =====

    function canvasToEditorCoords(clientX, clientY) {
      const rect = editorCanvas.getBoundingClientRect();
      const scaleX = CANVAS_W / rect.width;
      const scaleY = CANVAS_H / rect.height;
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    editorCanvas.addEventListener('mousedown', (e) => {
      if (!editorState || editorState.rendering || !editorState.hasCamera) return;
      const { x, y } = canvasToEditorCoords(e.clientX, e.clientY);
      const kf = getStateAtTime(editorState.currentTime);
      if (!kf.pipVisible) return;

      const pipW = editorState.pipSize;
      const pipH = editorState.pipSize;
      if (x >= kf.pipX && x <= kf.pipX + pipW && y >= kf.pipY && y <= kf.pipY + pipH) {
        draggingPip = true;
        dragOffsetX = x - kf.pipX;
        dragOffsetY = y - kf.pipY;
        e.preventDefault();
      }
    });

    window.addEventListener('mousemove', (e) => {
      if (!draggingPip || !editorState) return;
      const { x, y } = canvasToEditorCoords(e.clientX, e.clientY);
      const pipW = editorState.pipSize;
      const pipH = editorState.pipSize;

      let newX = x - dragOffsetX;
      let newY = y - dragOffsetY;

      // Constrain to canvas bounds
      newX = Math.max(0, Math.min(newX, CANVAS_W - pipW));
      newY = Math.max(0, Math.min(newY, CANVAS_H - pipH));

      // Update current keyframe's position (or the interpolated state)
      const time = editorState.currentTime;
      let existing = editorState.keyframes.find(kf => Math.abs(kf.time - time) < 0.001);
      if (existing) {
        existing.pipX = newX;
        existing.pipY = newY;
      } else {
        // Create a new keyframe at this position
        const current = getStateAtTime(time);
        editorState.keyframes.push({
          time,
          pipX: newX,
          pipY: newY,
          pipVisible: current.pipVisible
        });
        editorState.keyframes.sort((a, b) => a.time - b.time);
        renderKeyframeMarkers();
      }
    });

    window.addEventListener('mouseup', () => {
      draggingPip = false;
    });

    // ===== Timeline scrubber =====

    editorTimeline.addEventListener('mousedown', (e) => {
      if (!editorState || editorState.rendering) return;
      seekFromTimeline(e);
      const onMove = (e2) => seekFromTimeline(e2);
      const onUp = () => {
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });

    function seekFromTimeline(e) {
      const rect = editorTimeline.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      editorSeek(pct * editorState.duration);
    }

    // ===== Editor button handlers =====

    editorBackBtn.addEventListener('click', exitEditor);
    editorPlayBtn.addEventListener('click', editorTogglePlay);
    editorKeyframeBtn.addEventListener('click', addKeyframe);
    editorToggleCamBtn.addEventListener('click', toggleCameraVisibility);
    editorDeleteKfBtn.addEventListener('click', deleteNearestKeyframe);

    // ===== Render pipeline =====

    editorRenderBtn.addEventListener('click', async () => {
      if (!editorState || editorState.rendering) return;
      await renderVideo();
    });

    async function renderVideo() {
      editorState.rendering = true;
      editorRenderProgress.classList.remove('hidden');
      editorRenderBar.style.width = '0%';
      editorRenderLabel.textContent = 'Rendering...';
      editorPause();

      // Disable controls
      editorPlayBtn.disabled = true;
      editorKeyframeBtn.disabled = true;
      editorToggleCamBtn.disabled = true;
      editorDeleteKfBtn.disabled = true;
      editorRenderBtn.disabled = true;
      editorBackBtn.disabled = true;

      try {
        editorRenderBar.style.width = '10%';

        const renderKeyframes = editorState.keyframes.length > 0 && editorState.keyframes[0].time === 0
          ? editorState.keyframes
          : [{ time: 0, pipX: editorState.defaultPipX, pipY: editorState.defaultPipY, pipVisible: true }, ...editorState.keyframes];

        const mp4Path = await window.electronAPI.renderComposite({
          screenPath: editorState.screenPath,
          cameraPath: editorState.cameraPath,
          keyframes: renderKeyframes,
          pipSize: editorState.pipSize,
          screenFitMode: editorState.screenFitMode,
          sourceWidth: editorState.sourceWidth || CANVAS_W,
          sourceHeight: editorState.sourceHeight || CANVAS_H,
          outputFolder: saveFolder
        });

        editorRenderBar.style.width = '100%';
        editorRenderLabel.textContent = 'Done! Saved: ' + mp4Path.split('/').pop();
        console.log('Rendered:', mp4Path);
      } catch (err) {
        console.error('Render error:', err);
        editorRenderLabel.textContent = 'Render failed. Check console for details.';
        editorRenderBar.style.width = '100%';
      }

      // Re-enable controls
      editorPlayBtn.disabled = false;
      editorKeyframeBtn.disabled = false;
      editorToggleCamBtn.disabled = false;
      editorDeleteKfBtn.disabled = false;
      editorRenderBtn.disabled = false;
      editorBackBtn.disabled = false;
      editorState.rendering = false;

      editorSeek(0);
    }

    // ===== Keyboard shortcuts =====

    function updateSegmentBadge() {
      const total = speechSegments.length;
      const removed = speechSegments.filter(s => s.deleted).length;
      const active = total - removed;
      if (removed > 0) {
        segmentBadge.textContent = `${active} segment${active !== 1 ? 's' : ''} (${removed} removed)`;
      } else {
        segmentBadge.textContent = `${total} segment${total !== 1 ? 's' : ''}`;
      }
    }

    document.addEventListener('keydown', (e) => {
      // Backspace during recording: remove last non-deleted segment
      if (recording && e.code === 'Backspace') {
        e.preventDefault();
        for (let i = speechSegments.length - 1; i >= 0; i--) {
          if (!speechSegments[i].deleted) {
            speechSegments[i].deleted = true;
            const el = transcriptContent.querySelector(`[data-segment-index="${i}"]`);
            if (el) {
              el.style.textDecoration = 'line-through';
              el.style.opacity = '0.4';
            }
            updateSegmentBadge();
            break;
          }
        }
        return;
      }

      if (!editorState || editorState.rendering) return;
      // Don't capture if focus is in an input
      if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;

      if (e.code === 'Space') {
        e.preventDefault();
        editorTogglePlay();
      } else if (e.code === 'ArrowLeft') {
        e.preventDefault();
        editorSeek(editorState.currentTime - 1 / 30);
      } else if (e.code === 'ArrowRight') {
        e.preventDefault();
        editorSeek(editorState.currentTime + 1 / 30);
      } else if (e.code === 'KeyK') {
        e.preventDefault();
        addKeyframe();
      }
    });

    // Settings
    settingsBtn.addEventListener('click', () => {
      settingsPanel.classList.toggle('hidden');
    });

    openFolderBtn.addEventListener('click', () => {
      if (saveFolder) window.electronAPI.openFolder(saveFolder);
    });

    pickFolderBtn.addEventListener('click', async () => {
      const folder = await window.electronAPI.pickFolder();
      if (folder) {
        saveFolder = folder;
        localStorage.setItem('saveFolder', folder);
        folderPathEl.textContent = folder;
        openFolderBtn.classList.remove('hidden');
        updatePreview();
      }
    });

    // Source change handlers
    screenSelect.addEventListener('change', async () => {
      try { await updateScreenStream(); } catch (e) { console.error(e); }
      updatePreview();
    });

    cameraSelect.addEventListener('change', async () => {
      try { await updateCameraStream(); } catch (e) { console.error(e); }
      updatePreview();
    });

    audioSelect.addEventListener('change', async () => {
      try { await updateAudioStream(); } catch (e) { console.error(e); }
    });

    recordBtn.addEventListener('click', toggleRecording);

    // Init
    if (saveFolder) {
      folderPathEl.textContent = saveFolder;
      openFolderBtn.classList.remove('hidden');
    }
    enumerateDevices().then(async () => {
      try { await updateScreenStream(); } catch (e) {}
      try { await updateCameraStream(); } catch (e) {}
      try { await updateAudioStream(); } catch (e) {}
      updatePreview();
    });
  </script>
</body>
</html>
